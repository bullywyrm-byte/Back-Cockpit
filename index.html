<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniels Backstuben Cockpit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { border-left: 4px solid #d97706; background-color: #fef3c7; color: #92400e; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <div id="app" class="flex flex-col h-screen">
        <header class="bg-amber-600 text-white p-4 flex items-center justify-between shadow-lg">
            <h1 class="text-xl font-bold">Daniels Backstuben Cockpit</h1>
            <div id="status" class="text-xs opacity-75">System bereit</div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <nav class="w-20 md:w-64 bg-white border-r border-gray-200 flex flex-col p-2 gap-2">
                <button onclick="switchTab('recipes')" class="nav-btn p-3 rounded text-left hover:bg-gray-100 flex items-center gap-2">Rezepte</button>
                <button onclick="switchTab('oven')" class="nav-btn p-3 rounded text-left hover:bg-gray-100 flex items-center gap-2">Ofenplan</button>
                <button onclick="switchTab('shifts')" class="nav-btn p-3 rounded text-left hover:bg-gray-100 flex items-center gap-2">Schichtplan</button>
                <button onclick="switchTab('work')" class="nav-btn p-3 rounded text-left hover:bg-gray-100 flex items-center gap-2">Arbeitsplan</button>
                <button onclick="switchTab('backup')" class="nav-btn p-3 rounded text-left hover:bg-gray-100 flex items-center gap-2">Backup</button>
            </nav>

            <main class="flex-1 p-6 overflow-y-auto">
                <div id="recipes" class="tab-content active"><h2 class="text-2xl font-bold mb-4">Rezepte</h2><div id="recipes-list" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div></div>
                <div id="oven" class="tab-content"><h2 class="text-2xl font-bold mb-4">Ofenplan</h2><div id="oven-content">...</div></div>
                <div id="shifts" class="tab-content"><h2 class="text-2xl font-bold mb-4">Schichtplan</h2><div id="shifts-content">...</div></div>
                <div id="work" class="tab-content"><h2 class="text-2xl font-bold mb-4">Arbeitsplan</h2><div id="work-content">...</div></div>
                <div id="backup" class="tab-content"><h2 class="text-2xl font-bold mb-4">Datensicherung</h2><div id="backup-content"></div></div>
            </main>
        </div>
    </div>

    <script>
        // --- DATA STORE ---
        let state = JSON.parse(localStorage.getItem('cockpit_data')) || {
            recipes: [],
            ovenTasks: [],
            shifts: [],
            workTasks: []
        };

        function save() {
            localStorage.setItem('cockpit_data', JSON.stringify(state));
            renderAll();
        }

        // --- NAVIGATION ---
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- RENDERING ---
        function renderAll() {
            // Rezepte Grid
            const recipesList = document.getElementById('recipes-list');
            recipesList.innerHTML = state.recipes.map(r => `
                <div class="border rounded p-4 bg-white shadow-sm cursor-pointer hover:bg-amber-50">
                    ${r.image ? `<img src="${r.image}" class="w-full h-32 object-cover mb-2 rounded">` : '<div class="w-full h-32 bg-gray-200 mb-2 flex items-center justify-center">Kein Bild</div>'}
                    <h3 class="font-bold">${r.name}</h3>
                </div>
            `).join('') + `<button onclick="addRecipe()" class="border-2 border-dashed p-4 rounded text-gray-500 hover:bg-gray-100">+ Neues Rezept</button>`;
            
            // Backup
            document.getElementById('backup-content').innerHTML = `
                <button onclick="downloadBackup()" class="bg-blue-600 text-white p-3 rounded">JSON Backup herunterladen</button>
            `;
        }

        // --- ACTIONS ---
        function addRecipe() {
            const name = prompt("Name des Rezepts:");
            if(name) {
                state.recipes.push({ id: Date.now(), name, image: '', baseQty: 1 });
                save();
            }
        }

        function downloadBackup() {
            const data = JSON.stringify(state);
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'backup.json';
            a.click();
        }

        // Initial Start
        renderAll();
    </script>
</body>
</html>
