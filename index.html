<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniels Backstuben Cockpit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { ChefHat, Clock, Calendar, FileText, Save, Plus, Trash2, Users } = lucide;

        function App() {
            // Globaler State - gespeichert im LocalStorage für Offline-Nutzung
            const [activeTab, setActiveTab] = useState('recipes');
            const [recipes, setRecipes] = useState(() => JSON.parse(localStorage.getItem('cockpit_recipes') || '[]'));
            const [ovenTasks, setOvenTasks] = useState(() => JSON.parse(localStorage.getItem('cockpit_ovenTasks') || '[]'));
            const [shifts, setShifts] = useState(() => JSON.parse(localStorage.getItem('cockpit_shifts') || '[]'));

            useEffect(() => {
                localStorage.setItem('cockpit_recipes', JSON.stringify(recipes));
                localStorage.setItem('cockpit_ovenTasks', JSON.stringify(ovenTasks));
                localStorage.setItem('cockpit_shifts', JSON.stringify(shifts));
            }, [recipes, ovenTasks, shifts]);

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Navigation */}
                    <nav className="w-full md:w-64 bg-amber-600 text-white p-4 flex flex-col gap-2">
                        <div className="text-xl font-bold mb-6 flex items-center gap-2"><ChefHat /> Cockpit</div>
                        <button onClick={() => setActiveTab('recipes')} className="p-3 text-left hover:bg-amber-700 rounded">Rezepte</button>
                        <button onClick={() => setActiveTab('oven')} className="p-3 text-left hover:bg-amber-700 rounded">Ofenplan</button>
                        <button onClick={() => setActiveTab('shifts')} className="p-3 text-left hover:bg-amber-700 rounded">Schichtplan</button>
                    </nav>

                    {/* Main */}
                    <main className="flex-1 p-6 bg-gray-100">
                        {activeTab === 'recipes' && <RecipesView recipes={recipes} setRecipes={setRecipes} />}
                        {activeTab === 'oven' && <OvenView ovenTasks={ovenTasks} setOvenTasks={setOvenTasks} recipes={recipes} />}
                        {activeTab === 'shifts' && <ShiftsView shifts={shifts} setShifts={setShifts} />}
                    </main>
                </div>
            );
        }

        // Sub-Komponente für Rezepte
        function RecipesView({ recipes, setRecipes }) {
            const addRecipe = () => {
                const name = prompt("Name des Rezepts:");
                if (name) setRecipes([...recipes, { id: Date.now(), name: name, ingredients: [] }]);
            };
            return (
                <div className="bg-white p-6 rounded shadow">
                    <h2 className="text-2xl font-bold mb-4">Rezepte</h2>
                    <button onClick={addRecipe} className="bg-green-600 text-white px-4 py-2 rounded mb-4">Neues Rezept</button>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {recipes.map(r => (
                            <div key={r.id} className="border p-4 rounded bg-gray-50">
                                <h3 className="font-bold">{String(r.name)}</h3>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // Sub-Komponente für Ofen
        function OvenView({ ovenTasks, setOvenTasks, recipes }) {
            return (
                <div className="bg-white p-6 rounded shadow">
                    <h2 className="text-2xl font-bold mb-4">Ofenplan</h2>
                    <div className="space-y-2">
                        {ovenTasks.map(t => <div key={t.id} className="border-b p-2">{String(t.recipeName)} - {String(t.startTime)}</div>)}
                    </div>
                </div>
            );
        }

        // Sub-Komponente für Schichtplan
        function ShiftsView({ shifts, setShifts }) {
            return (
                <div className="bg-white p-6 rounded shadow">
                    <h2 className="text-2xl font-bold mb-4">Schichtplan</h2>
                    <div className="space-y-2">
                        {shifts.map(s => <div key={s.id} className="border-b p-2">{String(s.name)} am {String(s.date)}</div>)}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
